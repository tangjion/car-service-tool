<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf8">
    <!-- <link rel="stylesheet" href="button.css"> -->
    <link rel="stylesheet" href="car-tool.css">
  </head>
  <body>
    <!-- <button id="changeColor"></button> -->
    <div class="tool-wrap">
      <div class="left">
        <div class="tool-item">
          <div class="item-title">
            <img src="images/exchange.png" width="20">
            <span>更改客源国</span>
          </div>
          <ul class="item-list">
            <li id="CN">
              <img src="images/country/lang-zh-CN.svg" width="16" height="16">
              <span>CN</span>
            </li>
            <li id="HK">
              <img src="images/country/lang-zh-HK.svg" width="16" height="16">
              <span>HK</span>
            </li>
            <li id="TW">
              <img src="images/country/lang-zh-TW.svg" width="16" height="16">
              <span>TW</span>
            </li>
            <li id="US">
              <img src="images/country/lang-en-US.svg" width="16" height="16">
              <span>US</span>
            </li>
            <li id="KR">
              <img src="images/country/lang-ko.svg" width="16" height="16">
              <span>KR</span>
            </li>
            <li id="TH">
              <img src="images/country/lang-th.svg" width="16" height="16">
              <span>TH</span>
            </li>
            <li id="MY">
              <img src="images/country/lang-en-MY.svg" width="16" height="16">
              <span>MY</span>
            </li>
            <li id="JP">
              <img src="images/country/lang-ja.svg" width="16" height="16">
              <span>JP</span>
            </li>
            <li id="SG">
              <img src="images/country/lang-en-SG.svg" width="16" height="16">
              <span>SG</span>
            </li>
            <li id="AU">
              <img src="images/country/lang-en-AU.svg" width="16" height="16">
              <span>AU</span>
            </li>
            <li id="PH">
              <img src="images/country/lang-en-PH.svg" width="16" height="16">
              <span>PH</span>
            </li>
            <li id="NZ">
              <img src="images/country/lang-en-NZ.svg" width="16" height="16">
              <span>NZ</span>
            </li>
          </ul>
          <div class="item-input inline">
            <input type="text" id="sourceCode" placeholder="客源国">
            <div id="setSourceCode" class="item-btn">设置客源国</div>
          </div>
        </div>
        <div class="tool-item">
          <div class="item-title">
            <div class="item-checkbox" id="openIht"></div>
            <span>开启inHouseTracking日志</span>
          </div>
        </div>
        <div class="tool-item">
          <div class="item-title">
            <div class="item-checkbox" id="openGalileo"></div>
            <span>开启Galileo日志</span>
          </div>
        </div>
        <div class="tool-item">
          <div class="item-title">
            <div class="item-checkbox" id="showTextId"></div>
            <span>查看TextId</span>
          </div>
        </div>
        <div class="tool-item">
          <div class="item-title">
            <div class="item-checkbox" id="showGuestCheckout"></div>
            <span>开启guest Checkout</span>
          </div>
        </div>
        <div class="tool-item">
          <div class="item-title">
            <div class="item-checkbox" id="logDebug"></div>
            <span>log debug</span>
          </div>
        </div>
        <div class="tool-item">
          <div class="item-title">
            <div class="item-checkbox" id="openReportLog"></div>
            <span>report log debug</span>
          </div>
        </div>
        <div class="tool-item">
          <div class="item-title">
            <div class="item-checkbox" id="switchSsr"></div>
            <span>切换ssr服务</span>
          </div>
        </div>
      </div>
      <div class="right">
        <div class="tool-item">
          <p class="item-title">
            <img src="images/closed.png" width="20">
            <span>重置AB实验id</span>
          </p>
          <div class="item-input">
            <input type="text" id="keplerId" placeholder="Keplerid">
            <div class="item-select-title">请选择AB实验:</div>
            <select id="keplerIdSelect">
              <option value="">请选择AB实验</option>
              <option value="CR_insurance_migration-Control">insurance-control</option>
              <option value="CR_insurance_migration-Test">insurance-test</option>
              <option value="CR_DetailPage_Revamp-control">DP_Revamp-control</option>
              <option value="CR_DetailPage_Revamp-test">DP_Revamp-test</option>
              <option value="US_TPL-control">DP_TPL-control</option>
              <option value="US_TPL-test">DP_TPL-test</option>
              <option value="CR_Mainsite_SCOP-control">SCOP-control</option>
              <option value="CR_Mainsite_SCOP-test">SCOP-test</option>
              <option value="CR_MSE_SCOP-control">SCOP_MSE-control</option>
              <option value="CR_MSE_SCOP-test">SCOP_MSE-test</option>
              <option value="PAT_SCOP-control">PAT_SCOP-control</option>
              <option value="PAT_SCOP-test">PAT_SCOP-test</option>
              <option value="CarRental_SRP_simplifed-control">CR_SRP_simplifed-control</option>
              <option value="CarRental_SRP_simplifed-test">CR_SRP_simplifed-test</option>
            </select>
            <div class="item-btn-wrap">
              <div id="setKeplerId" class="item-btn">设置Keplerid</div>
              <div id="resetKeplerId" class="item-btn">刷新Keplerid</div>
            </div>
          </div>
        </div>
        <div class="tool-item">
          <p class="item-title">
            <img src="images/closed.png" width="20">
            <span>随机生成香港身份证</span>
          </p>
          <div class="item-input">
            <input type="text" id="hkId" placeholder="HKID">
            <div class="item-btn-wrap">
              <div id="generateHKId" class="item-btn">生成香港身份证</div>
            </div>
          </div>
        </div>
        <div class="tool-item">
          <p class="item-title">
            <img src="images/closed.png" width="20">
            <span>修改请求头</span>
          </p>
          <div class="item-input">
            <input type="text" id="headerName" placeholder="请求头名称 (如 X-Custom-Header)">
            <input type="text" id="headerValue" placeholder="请求头值" style="margin-top: 8px;">
            <div class="item-btn-wrap">
              <div id="setHeader" class="item-btn">设置请求头</div>
              <div id="clearHeader" class="item-btn">清除</div>
            </div>
          </div>
        </div>
      </div>
      
      <!-- <div class="button-wrap">
        <div class="btn" id="copyPt">复制PT</div>
      </div> -->
      
    </div>
    <script src="popup.js"></script>
  </body>
</html>
